<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>SAINTstudio &mdash; Barbershop & Creative Agency</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="vendor/model-viewer.min.js"></script>
  </head>
  <body class="home-page">
    <a class="skip-link" href="#main-content">Skip to content</a>

    <main id="main-content">
      <section class="sculpture-hero" aria-label="SAINTstudio introduction">
        <header class="sculpture-header">
          <nav class="sculpture-nav" aria-label="Primary">
            <a href="barbershop.html">Barbershop</a>
            <a href="creative-agency.html">Creative Agency</a>
            <a href="team.html">Our Team</a>
            <a href="contact.html">Contact</a>
          </nav>
          <a class="brand-wrap sculpture-brand" href="index.html" aria-label="SAINTstudio home">
            <span class="brand"><strong>SAINT</strong><span>studio</span></span>
          </a>
        </header>

        <div class="hero-composition">
          <div class="sculpture-stage" aria-hidden="true">
            <model-viewer
              class="hero-model"
              src="3d-models/logo.glb"
              alt=""
              auto-rotate
              rotation-per-second="8deg"
              camera-orbit="90deg 70deg 92%"
              exposure="0.8"
              shadow-intensity="0"
              interaction-prompt="none"
              loading="eager"
            ></model-viewer>
          </div>

          <div class="hero-center reveal">
            <a class="hero-book-button" href="barbershop.html#booking">Book Now</a>
          </div>
        </div>

      </section>

      <section class="section">
        <div class="container visit-grid">
          <div class="visit-copy reveal">
            <p class="eyebrow">Visit Us</p>
            <h2>1154 Morningside Ave</h2>
            <p>Toronto, Ontario</p>
          </div>
          <div class="map-frame reveal">
            <iframe
              title="Map showing 1154 Morningside Ave, Toronto, Ontario"
              loading="lazy"
              src="https://www.google.com/maps?q=1154%20Morningside%20Ave%2C%20Toronto%2C%20Ontario&output=embed"
            ></iframe>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <div class="footer-brand"><strong>SAINT</strong>studio</div>
        <div class="footer-copy">1154 Morningside Ave &middot; Toronto, Ontario</div>
        <div class="footer-socials">
          <a class="icon-link" href="https://www.instagram.com/" aria-label="Instagram">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="3" y="3" width="18" height="18" rx="5" />
              <circle cx="12" cy="12" r="4.2" />
              <circle cx="17.4" cy="6.8" r="1" fill="currentColor" stroke="none" />
            </svg>
          </a>
          <a class="icon-link" href="mailto:hello@saintstudio.ca" aria-label="Email">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M4 6h16v12H4z" />
              <path d="m4 7 8 6 8-6" />
            </svg>
          </a>
        </div>
      </div>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
